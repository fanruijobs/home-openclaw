services:
  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    build:
      context: .
      dockerfile: Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-ollama-local}
      OPENCLAW_OLLAMA_BASE_URL: ${OPENCLAW_OLLAMA_BASE_URL:-http://192.168.31.191:11434}
      OPENCLAW_OLLAMA_MODEL: ${OPENCLAW_OLLAMA_MODEL:-gpt-oss:20b}
      OPENCLAW_OLLAMA_MODEL_NAME: ${OPENCLAW_OLLAMA_MODEL_NAME:-GPT-OSS 20B}
      OPENCLAW_OLLAMA_CONTEXT_WINDOW: ${OPENCLAW_OLLAMA_CONTEXT_WINDOW:-8192}
      OPENCLAW_CONFIG_DIR: /home/node/.openclaw
      OPENCLAW_WORKSPACE_DIR: /home/node/.openclaw/workspace
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-./.openclaw}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR:-./.openclaw/workspace}:/home/node/.openclaw/workspace
      ## Uncomment the lines below to enable sandbox isolation
      ## (agents.defaults.sandbox). Requires Docker CLI in the image
      ## (build with --build-arg OPENCLAW_INSTALL_DOCKER_CLI=1) or use
      ## docker-setup.sh with OPENCLAW_SANDBOX=1 for automated setup.
      ## Set DOCKER_GID to the host's docker group GID (run: stat -c '%g' /var/run/docker.sock).
      # - /var/run/docker.sock:/var/run/docker.sock
    # group_add:
    #   - "${DOCKER_GID:-999}"
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "${OPENCLAW_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    command:
      - sh
      - -lc
      - |
        mkdir -p /home/node/.openclaw /home/node/.openclaw/workspace
        if [ ! -f /home/node/.openclaw/openclaw.json ]; then
          if [ ! -w /home/node/.openclaw ]; then
            echo "Config mount /home/node/.openclaw is not writable by the container user." >&2
            echo "Fix host permissions or provide .openclaw/openclaw.json before starting the stack." >&2
            exit 1
          fi
          cat >/home/node/.openclaw/openclaw.json <<EOF
        {
          "models": {
            "providers": {
              "ollama": {
                "api": "ollama",
                "baseUrl": "${OPENCLAW_OLLAMA_BASE_URL}",
                "apiKey": "${OLLAMA_API_KEY}",
                "models": [
                  {
                    "id": "${OPENCLAW_OLLAMA_MODEL}",
                    "name": "${OPENCLAW_OLLAMA_MODEL_NAME}",
                    "reasoning": false,
                    "input": ["text"],
                    "cost": { "input": 0, "output": 0, "cacheRead": 0, "cacheWrite": 0 },
                    "contextWindow": ${OPENCLAW_OLLAMA_CONTEXT_WINDOW},
                    "maxTokens": ${OPENCLAW_OLLAMA_CONTEXT_WINDOW}0
                  }
                ]
              }
            }
          },
          "agents": {
            "defaults": {
              "model": { "primary": "ollama/${OPENCLAW_OLLAMA_MODEL}" }
            }
          },
          "gateway": {
            "mode": "local",
            "bind": "${OPENCLAW_GATEWAY_BIND:-lan}"
          }
        }
        EOF
        fi
        exec node dist/index.js gateway --bind "${OPENCLAW_GATEWAY_BIND:-lan}" --port 18789
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  openclaw-cli:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    network_mode: "service:openclaw-gateway"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-ollama-local}
      OPENCLAW_CONFIG_DIR: /home/node/.openclaw
      OPENCLAW_WORKSPACE_DIR: /home/node/.openclaw/workspace
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-./.openclaw}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR:-./.openclaw/workspace}:/home/node/.openclaw/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
    depends_on:
      - openclaw-gateway
